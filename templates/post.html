<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>作品を投稿する - AI Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="mb-4">新しい作品を投稿する</h1>
        
        <form action="/post" method="POST" class="card p-4 shadow-sm">
            <div class="mb-3">
                <label class="form-label">ユーザー名</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">作品タイトル</label>
                <input type="text" name="title" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label d-block">ジャンル</label>
                {% for genre in ["小説", "エッセイ", "論文", "詩", "その他"] %}
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="genre" value="{{ genre }}" id="genre_{{ loop.index }}" required>
                    <label class="form-check-label" for="genre_{{ loop.index }}">{{ genre }}</label>
                </div>
                {% endfor %}
            </div>

            <div class="mb-3">
                <label class="form-label d-block">使用した生成AI</label>
                {% for ai in ["ChatGPT", "Claude", "Gemini", "Llama", "その他"] %}
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="ai_model" value="{{ ai }}" id="ai_{{ loop.index }}" required>
                    <label class="form-check-label" for="ai_{{ loop.index }}">{{ ai }}</label>
                </div>
                {% endfor %}
            </div>

            <div class="mb-3">
                <label class="form-label">プロンプト</label>
                <textarea name="prompt" class="form-control" rows="4" required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">生成された文章</label>
                <textarea name="content" class="form-control" rows="8" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-lg">投稿する</button>
        </form>
    </div>
</body>
</html>
