<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>分析ボード - AI Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-dark text-white py-5">
    <div class="container">
        <h1 class="mb-4">📊 分析ダッシュボード</h1>
        <div class="row">
            <div class="col-md-4">
                <div class="card bg-primary text-white mb-4">
                    <div class="card-body text-center"><h5>総投稿数</h5><h2>{{ total_posts }}</h2></div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card p-3 mb-4 text-dark">
                    <h5>🤖 使用AIシェア</h5>
                    <canvas id="aiChart" height="100"></canvas>
                </div>
            </div>
        </div>
        <div class="card p-3 text-dark">
            <h5>🔥 閲覧トップ3</h5>
            <table class="table">
                <thead><tr><th>タイトル</th><th>作者</th><th>閲覧数</th></tr></thead>
                <tbody>
                    {% for p in top_posts %}
                    <tr><td>{{ p.title }}</td><td>{{ p.username }}</td><td>{{ p.views }}</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    <script>
        new Chart(document.getElementById('aiChart'), {
            type: 'pie',
            data: {
                labels: {{ ai_stats.keys()|list|tojson }},
                datasets: [{ data: {{ ai_stats.values()|list|tojson }}, backgroundColor: ['#007bff','#28a745','#ffc107','#dc3545','#17a2b8'] }]
            }
        });
    </script>
</body>
</html>
