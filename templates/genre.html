<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{{ genre_name }} アーカイブ - 電脳図書館</title>
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --cyber-blue: #00fff2; --cyber-pink: #ff00de; }
        body {
            background-image: url("{{ url_for('static', filename='cyber_bg.jpg') }}") !important;
            background-size: cover; background-attachment: fixed;
            background-color: #0d0d0d !important; color: #e0e0e0 !important;
            font-family: sans-serif; min-height: 100vh;
        }
        .cyber-card {
            background: rgba(10, 10, 25, 0.9) !important;
            border: 1px solid var(--cyber-blue) !important;
            box-shadow: 0 0 10px rgba(0, 255, 242, 0.2);
        }
        .neon-text {
            color: var(--cyber-blue);
            text-shadow: 0 0 10px var(--cyber-blue);
        }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h1 class="neon-text h2">>> STORAGE_SECTOR: {{ genre_name }}</h1>
            <a href="/" class="btn btn-outline-light btn-sm">RETURN_TO_HUB (戻る)</a>
        </div>

        <div class="row">
            {% for post in posts %}
            <div class="col-md-4 mb-4">
                <div class="card cyber-card h-100 p-3">
                    <h5 class="h6 text-white mb-2">{{ post.title }}</h5>
                    <div class="mt-auto pt-3" style="border-top: 1px solid rgba(0, 255, 242, 0.2);">
                        <p class="small text-info mb-1">USER: {{ post.username }}</p>
                        <p class="small text-muted mb-3">ACCESS: {{ post.views }} / {{ post.created_at | time_since }}</p>
                        <a href="/view/{{ post.id }}" class="btn btn-sm btn-outline-info w-100">データ展開</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        {% if not posts %}
        <p class="text-center text-muted mt-5">該当するデータはまだアーカイブされていません。</p>
        {% endif %}
    </div>
</body>
</html>
