<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マイページ - AI Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>こんにちは、{{ username }} さん</h1>
            <a href="/" class="btn btn-outline-secondary">トップへ戻る</a>
        </div>

        <div class="card mb-5 shadow-sm">
            <div class="card-body">
                <h5 class="card-title">ユーザー名の変更</h5>
                <form action="/update_user" method="POST" class="row g-3">
                    <input type="hidden" name="old_username" value="{{ username }}">
                    <div class="col-auto">
                        <input type="text" name="new_username" class="form-control" placeholder="新しい名前" required>
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-warning">変更する</button>
                    </div>
                </form>
            </div>
        </div>

        <h3>あなたの投稿一覧</h3>
        <div class="table-responsive">
            <table class="table table-hover bg-white shadow-sm">
                <thead>
                    <tr>
                        <th>タイトル</th>
                        <th>ジャンル</th>
                        <th>閲覧数</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for post in posts %}
                    <tr>
                        <td>{{ post.title }}</td>
                        <td>{{ post.genre }}</td>
                        <td>{{ post.views }}回</td>
                        <td>
                            <a href="/edit/{{ post.id }}" class="btn btn-sm btn-outline-primary">編集</a>
                            <a href="/delete/{{ post.id }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('本当に削除しますか？')">削除</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
