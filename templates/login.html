<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン - AI Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">AI Library</a>
            <div>
                <a href="/" class="btn btn-outline-light btn-sm">トップページへ戻る</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="text-center mb-4">ログイン / 新規登録</h3>
                        <form action="/login" method="POST">
                            <div class="mb-3">
                                <label class="form-label">ユーザー名</label>
                                <input type="text" name="username" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">パスワード</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">ログイン・登録</button>
                        </form>
                        <hr>
                        <p class="small text-muted text-center">※名前がなければ新規登録、あればログインします。</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
