<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>作品を編集 - AI Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1>作品を編集する</h1>
        <form action="/edit/{{ post.id }}" method="POST" class="card p-4 shadow-sm">
            <div class="mb-3">
                <label class="form-label">作品タイトル</label>
                <input type="text" name="title" class="form-control" value="{{ post.title }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label d-block">ジャンル</label>
                {% for genre in ["小説", "エッセイ", "論文", "詩", "その他"] %}
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="genre" value="{{ genre }}" {% if post.genre == genre %}checked{% endif %} required>
                    <label class="form-check-label">{{ genre }}</label>
                </div>
                {% endfor %}
            </div>
            <div class="mb-3">
                <label class="form-label">プロンプト</label>
                <textarea name="prompt" class="form-control" rows="4" required>{{ post.prompt }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">生成された文章</label>
                <textarea name="content" class="form-control" rows="8" required>{{ post.content }}</textarea>
            </div>
            <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-success btn-lg">更新する</button>
                <a href="/mypage/{{ post.username }}" class="btn btn-outline-secondary">キャンセル</a>
            </div>
        </form>
    </div>
</body>
</html>
